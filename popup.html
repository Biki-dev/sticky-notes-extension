<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #fffdf0;
      padding: 14px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    #site-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    textarea {
      width: 100%;
      height: 100px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      resize: vertical;
      background: #fff;
      outline: none;
      font-family: inherit;
    }

    textarea:focus { border-color: #f5c842; }

    #btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    #btn-save {
      background: #f5c842;
      color: #333;
    }

    #btn-save:hover { background: #e6b800; }

    #btn-clear {
      background: #eee;
      color: #666;
    }

    #btn-clear:hover { background: #ddd; }

    #status {
      margin-top: 8px;
      font-size: 11px;
      color: #4caf50;
      min-height: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <span>📝</span>
    <h2>Site Sticky Notes</h2>
  </header>

  <div id="site-label">Loading...</div>
  <textarea id="note-input" placeholder="Write a note for this site..."></textarea>

  <div id="btn-row">
    <button id="btn-save">Save Note</button>
    <button id="btn-clear">Clear</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
