<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Reenie+Beanie&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --cork: #8B6914;
      --cork-dark: #6b4f0f;
      --paper: #fdf6e3;
      --paper-aged: #f5e6c8;
      --ink: #2c1a0e;
      --ink-faded: #5c4033;
      --pin-red: #c0392b;
      --pin-shadow: rgba(0,0,0,0.4);
      --tape: rgba(180,220,255,0.45);
      --accent-green: #3d6b4f;
      --accent-amber: #c87941;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 420px;
      max-height: 560px;
      font-family: 'Caveat', cursive;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          rgba(0,0,0,0.07) 28px,
          rgba(0,0,0,0.07) 29px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 28px,
          rgba(0,0,0,0.04) 28px,
          rgba(0,0,0,0.04) 29px
        ),
        radial-gradient(ellipse at 20% 30%, #a07828 0%, #7a5510 40%, #5c3d0a 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: default;
    }

    /* Cork texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 25%, rgba(255,220,120,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(100,60,10,0.18) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .header {
      position: relative;
      z-index: 10;
      padding: 14px 16px 10px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .brand-title {
      font-family: 'DM Serif Display', serif;
      font-size: 19px;
      color: var(--paper);
      letter-spacing: 0.02em;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
      line-height: 1;
    }

    .brand-sub {
      font-family: 'Caveat', cursive;
      font-size: 12px;
      color: rgba(253,246,227,0.6);
      letter-spacing: 0.05em;
    }

    .site-badge {
      background: var(--paper-aged);
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 3px;
      padding: 3px 8px;
      font-family: 'Caveat', cursive;
      font-size: 11px;
      color: var(--ink-faded);
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      box-shadow: 1px 2px 4px rgba(0,0,0,0.25),
                  inset 0 1px 0 rgba(255,255,255,0.6);
      transform: rotate(-1deg);
    }

    /* ── Notes area ── */
    #notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px 4px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 5;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }

    #empty-msg {
      text-align: center;
      color: rgba(253,246,227,0.55);
      font-size: 15px;
      padding: 32px 0 20px;
      font-family: 'Reenie Beanie', cursive;
      font-size: 18px;
      letter-spacing: 0.04em;
      line-height: 1.6;
    }

    /* ── Note card ── */
    .note-item {
      position: relative;
      background: var(--paper);
      border-radius: 2px;
      padding: 28px 12px 12px;
      box-shadow:
        2px 4px 10px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.8),
        inset 0 -1px 0 rgba(0,0,0,0.05);
      animation: cardDrop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      background-image:
        repeating-linear-gradient(
          transparent,
          transparent 23px,
          rgba(100,149,237,0.15) 23px,
          rgba(100,149,237,0.15) 24px
        );
    }

    .note-item:nth-child(odd)  { transform: rotate(-1.2deg); }
    .note-item:nth-child(even) { transform: rotate(0.8deg); }
    .note-item:nth-child(3n)   { transform: rotate(-0.4deg); }

    @keyframes cardDrop {
      from { opacity: 0; transform: translateY(-12px) rotate(-3deg) scale(0.95); }
      to   { opacity: 1; }
    }

    /* Pushpin */
    .note-item::before {
      content: '';
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      background: radial-gradient(circle at 35% 30%, #e74c3c, #922b21);
      border-radius: 50%;
      box-shadow:
        0 2px 5px rgba(0,0,0,0.5),
        inset 0 1px 2px rgba(255,255,255,0.4);
      z-index: 10;
    }

    /* Pin stem */
    .note-item::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 6px;
      background: rgba(0,0,0,0.3);
      border-radius: 0 0 1px 1px;
    }

    .note-item textarea {
      width: 100%;
      border: none;
      background: transparent;
      font-family: 'Caveat', cursive;
      font-size: 16px;
      color: var(--ink);
      resize: none;
      outline: none;
      height: 72px;
      line-height: 24px;
      letter-spacing: 0.02em;
    }

    .note-item textarea::placeholder {
      color: rgba(92,64,51,0.35);
      font-style: italic;
    }

    .note-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn-del {
      background: none;
      border: none;
      font-size: 11px;
      font-family: 'Caveat', cursive;
      cursor: pointer;
      color: rgba(92,64,51,0.4);
      padding: 2px 4px;
      border-radius: 2px;
      transition: color 0.2s, background 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-del:hover {
      color: #922b21;
      background: rgba(192,57,43,0.08);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 10;
      padding: 10px 14px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-add {
      flex: 1;
      padding: 9px 0;
      border: 2px dashed rgba(253,246,227,0.4);
      border-radius: 3px;
      background: rgba(253,246,227,0.08);
      color: rgba(253,246,227,0.85);
      font-family: 'Caveat', cursive;
      font-size: 15px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.2s;
    }

    .btn-add:hover {
      background: rgba(253,246,227,0.18);
      border-color: rgba(253,246,227,0.7);
      color: var(--paper);
    }

    .btn-save {
      padding: 9px 16px;
      border: none;
      border-radius: 3px;
      background: var(--paper-aged);
      color: var(--ink);
      font-family: 'DM Serif Display', serif;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow:
        1px 2px 5px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.7);
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-save:hover {
      background: var(--paper);
      transform: translateY(-1px);
      box-shadow: 2px 4px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    /* Rubber stamp effect on save */
    .btn-save.stamped::after {
      content: '✓ pinned';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper-aged);
      color: var(--accent-green);
      font-family: 'Caveat', cursive;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      animation: stampIn 0.25s ease both;
    }

    @keyframes stampIn {
      from { opacity: 0; transform: scale(1.4); }
      to   { opacity: 1; transform: scale(1); }
    }

    #status {
      display: none; /* handled by stamp effect */
    }

    /* Scrollbar */
    #notes-list::-webkit-scrollbar { width: 4px; }
    #notes-list::-webkit-scrollbar-track { background: transparent; }
    #notes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <div class="brand-title">Sticky Notes</div>
      <div class="brand-sub">site memories</div>
    </div>
    <div class="site-badge" id="site-label">loading…</div>
  </div>

  <div id="notes-list">
    <div id="empty-msg">nothing pinned here yet.<br>add your first note ↓</div>
  </div>

  <footer>
    <button class="btn-add" id="btn-add">+ pin a note</button>
    <button class="btn-save" id="btn-save">Save All</button>
  </footer>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
