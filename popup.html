<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #fffdf0;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid #f0e68c;
    }

    header h2 { font-size: 14px; font-weight: 600; color: #333; }

    #site-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .note-item {
      background: #fff9c4;
      border: 1px solid #f5c842;
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .note-item textarea {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      outline: none;
      height: 56px;
      color: #333;
      line-height: 1.5;
    }

    .note-item textarea:focus { outline: none; }

    .btn-del {
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      color: #bbb;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }

    .btn-del:hover { color: #e53935; }

    #empty-msg {
      text-align: center;
      color: #bbb;
      font-size: 12px;
      padding: 24px 0;
    }

    footer {
      padding: 8px 10px;
      border-top: 1px solid #f0e68c;
      display: flex;
      gap: 8px;
    }

    button.primary {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: #f5c842;
      color: #333;
    }

    button.primary:hover { background: #e6b800; }

    button.secondary {
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      background: #eee;
      color: #666;
    }

    button.secondary:hover { background: #ddd; }

    #status {
      text-align: center;
      font-size: 11px;
      color: #4caf50;
      padding: 4px 0 6px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h2>📝 Site Sticky Notes</h2>
    <div id="site-label">Loading...</div>
  </header>

  <div id="notes-list">
    <div id="empty-msg">No notes for this site yet.</div>
  </div>

  <footer>
    <button class="primary" id="btn-add">+ Add Note</button>
    <button class="secondary" id="btn-save">Save All</button>
  </footer>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
